name: cashier_lebanon_pro
description: Professional Offline POS System for Lebanon - Cashier Lebanon Pro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # Barcode & QR
  mobile_scanner: ^4.0.1
  qr_flutter: ^4.1.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # File Handling
  file_picker: ^8.0.3

  # Image Handling
  image_picker: ^1.0.7

  # Sharing & Utils
  share_plus: ^7.2.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  # UI Components
  flutter_svg: ^2.0.9

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  

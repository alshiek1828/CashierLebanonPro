name: cashier_lebanon_pro
description: Professional Offline POS System for Lebanon - Cashier Lebanon Pro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0

  # Barcode & QR
  mobile_scanner: ^4.0.1
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # File Handling
  file_picker: ^8.0.3
  cross_file: ^1.0.0

  # Image Handling
  image_picker: ^1.0.7
  image: ^4.1.7

  # Sharing & Utils
  share_plus: ^7.2.2
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  uuid: ^4.3.3

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.16.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
